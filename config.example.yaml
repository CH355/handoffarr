# Handoffarr example configuration.
#
# Copy this file to config/config.yaml and fill in your real values LOCALLY.
# config/config.yaml is git-ignored on purpose — never commit real secrets.

app:
  poll_interval_seconds: 15
  lookback_minutes: 120
  stale_peer_minutes: 10

storage:
  enabled: false
  volumes:
    - label: downloads
      path: "/downloads"
  thresholds:
    critical_free_bytes: 1073741824      # 1 GiB
    warning_free_bytes: 10737418240      # 10 GiB
    completed_torrent_count: 25
    retained_bytes: 107374182400         # 100 GiB

library:
  enabled: false
  roots:
    - label: shows
      media_type: series
      path: "/PlexMedia/Shows"
    - label: movies
      media_type: movie
      path: "/PlexMedia/Movies"
    - label: music
      media_type: music
      path: "/PlexMedia/Music"
  max_scan_entries: 5000
  # Translate container-side paths reported by Radarr/Sonarr/Lidarr into the
  # host-visible paths Handoffarr can stat. Longest source prefix wins.
  # Per-service overrides live under services.<name>.path_mappings.
  path_mappings:
    - from: "/movies"
      to: "/mnt/192.168.55.19/PlexMedia/Movies"
    - from: "/tv"
      to: "/mnt/192.168.55.19/PlexMedia/Shows"

cleanup:
  thresholds:
    failure_after_hours: 24
    # Optional. When set, torrents below this ratio are treated as intentional
    # retention rather than recoverable cleanup candidates.
    retention_min_ratio:

cleanup_review:
  enabled: true
  max_file_checks_per_poll: 200
  file_size_tolerance_bytes: 10485760  # 10 MiB

cleanup_execution:
  enabled: false
  allow_single_item_execution: false
  allow_batch_execution: false
  require_confirmation_phrase: true
  require_batch_dry_run: true
  max_items_per_request: 1
  max_batch_items: 5
  allowed_review_class: "Safe Review Candidate"
  allowed_match_strengths:
    - "Exact Hash/DownloadId Match"
    - "Exact Library Path Match"
    - "Filename + Size Match"

services:
  seerr:
    enabled: true
    base_url: "http://jellyseerr:5055"
    api_key: "PASTE_SEERR_API_KEY_HERE"
    request_endpoint: "/api/v1/request"

  radarr:
    enabled: true
    base_url: "http://radarr:7878"
    api_key: "PASTE_RADARR_API_KEY_HERE"
    history_endpoint: "/api/v3/history"
    # Radarr-specific root-folder mappings. Merged with library.path_mappings.
    path_mappings:
      - from: "/movies"
        to: "/mnt/192.168.55.19/PlexMedia/Movies"

  sonarr:
    enabled: false
    base_url: "http://sonarr:8989"
    api_key: "PASTE_SONARR_API_KEY_HERE"
    history_endpoint: "/api/v3/history"
    # Sonarr-specific root-folder mappings. Merged with library.path_mappings.
    path_mappings:
      - from: "/tv"
        to: "/mnt/192.168.55.19/PlexMedia/Shows"

  lidarr:
    enabled: false
    base_url: "http://lidarr:8686"
    api_key: "PASTE_LIDARR_API_KEY_HERE"
    history_endpoint: "/api/v1/history"

  qbittorrent:
    enabled: true
    base_url: "http://qbittorrent:8080"
    username: "admin"
    password: "PASTE_QBITTORRENT_PASSWORD_HERE"
    torrents_endpoint: "/api/v2/torrents/info"
    trackers_endpoint: "/api/v2/torrents/trackers"
    # Optional overrides for the queue-diagnostics endpoints (defaults shown).
    # transfer_info_endpoint: "/api/v2/transfer/info"
    # preferences_endpoint: "/api/v2/app/preferences"
    # speed_limits_mode_endpoint: "/api/v2/transfer/speedLimitsMode"
    # maindata_endpoint: "/api/v2/sync/maindata"
    # properties_endpoint: "/api/v2/torrents/properties"
    # peers_endpoint: "/api/v2/sync/torrentPeers"

thresholds:
  low_reported_seeds: 5
  healthy_reported_seeds: 20
  actual_peers_zero_minutes: 5

matching:
  prefer_torrent_hash: true
  fallback_to_download_id: true
  fallback_to_normalized_title: true
  title_time_window_minutes: 60
